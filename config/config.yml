# Webpage
websiteTitle: "Eric's Website"
websiteIcon: "/favicon.svg"

# Postgres database
data:
  - dbname: WywyWebsite
    tables:
      - tableName: daily
        read: true
        write: true
        entrytype: form
        schema:
          # Please note that the datatype is what the PostgreSQL database will recognize (e.g. Typescript has no way of differentiating an integer from a float).
          - name: Date
            parser: date # the datatype that the parser should attempt to cast to
            datatype: timestamp
            entrytype: calendar time
            description: The estimate of when you gained conciousness at the start of this (sleep-based) day.

          - name: Work Ethic
            datatype: int
            entrytype: linearSlider
            comments: true
            description: How much drive did you have to do work today?

          - name: Time Efficiency
            datatype: int
            entrytype: linearSlider
            comments: true
            description: How much % of time did you productivity exploit to achieve your (any type of) goals today? Compare to the feasible maximum.

          - name: Happiness
            datatype: int
            entrytype: linearSlider
            comments: true
            description: What % are you feeling today?
          - name: Awareness
            datatype: int
            entrytype: linearSlider
            comments: true
            description: How alert are you today? Tired? Focused?
        metrics:
          - name: Work Ethic
            data: [Work Ethic]
          - name: Time Efficiency
            args: [Time Efficiency]
          - name: Happiness
            data: [Happiness]
          - name: Awareness
            data: [Awareness]

      - tableName: events
        read: true
        write: true
        entrytype: timer
        tagging: true
        schema:
          - name: Start Time
            datatype: timestamp
            entrytype: calendar time
            record_on: start

          - name: End time
            datatype: timestamp
            entrytype: calendar time
            record_on: split

          - name: Start Location
            datatype: geodetic point
            entrytype: geodetic point minimal
            record_on: start
            optional: true

          - name: End Location
            datatype: geodetic point
            entrytype: geodetic point minimal
            record_on: split
            optional: true

          # - name: Duration
          #   invertible: true
          #   datatype: interval
          #   entrytype: duration textbox
          #   description: An estimate related to the event length. Positive values represent how long the event occured for. Negative values represent how long the event did not actively occur inside the respective time interval.
        descriptors:
          - name: Sleep
            schema:
              - name: Sleep Quality
                datatype: int
                entrytype: linearSlider
                comments: true
                description: How would you rate you sleep quality?

              - name: Sleep Behaviour
                datatype: int
                entrytype: linearSlider
                comments: true
                description: How well did you actions today facilitate a good night's rest? The importance is less on how good you sleep and moreso about how good the actions are.
            metrics:
              - name: Sleep Quality
                data: [Sleep Quality]
              - name: Sleep Behaviour
                data: [Sleep Behaviour]
        metrics:
          - name: Start Time
            data: [Start Time]
          - name: End Time
            data: [End Time]
          - name: Duration
            function: subtraction
            data: [End Time, Start Time]
          - name: Event Primary Tag
            data: [Primary Tag]

    dashboard:
      - name: Score
        type: Radial Chart
        selector: closest_step_selector
        selector args: [now]
        metrics:
          - Work Ethic
          - Time Efficiency
          - Happiness
      - name: Events Totality
        type: Waterfall Chart
        selector: step_within
        selector args: [now, now-86400000] # within 24h
        metrics: [Start Time, End Time, Event Primary Tag]
      - name: Events Breakdown
        type: Gantt
        selector: step_within
        selector args: [now, now-86400000] # within 24h
        metrics: [Start Time, Duration, Event Primary Tag]
      - name: Work Ethic
        type: Radial Chart
        selector: closest_step_selector
        selector args: [now]
        metrics: [Work Ethic]
        min: 0
        max: 100
      - name: Time Efficiency
        type: Radial Chart
        selector: closest_step_selector
        selector args: [now]
        metrics: [Time Efficiency]
        min: 0
        max: 100
      - name: Happiness
        type: Radial Chart
        selector: closest_step_selector
        selector args: [now]
        metrics: [Happiness]
        min: 0
        max: 100
      - name: Awareness
        type: Radial Chart
        selector: closest_step_selector
        selector args: [now]
        metrics: [Awareness]
        min: 0
        max: 100
